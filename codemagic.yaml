workflows:
  unity-ios-workflow:
    name: Unity iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - unity_credentials # Nhóm biến chứa tài khoản Unity (UNITY_USERNAME, UNITY_PASSWORD)
      xcode: latest
      cocoapods: default
    scripts:
      - name: Retrieve Used Unity Version
        script: |
          # Trích xuất phiên bản Unity và changeset từ ProjectVersion.txt
          UNITY_VERSION=$(echo $(sed -n '1p' PROJECT_NRO_240_GOC/ProjectSettings/ProjectVersion.txt) | cut -c 18-)
          UNITY_VERSION_CHANGESET=$(echo $(sed -n '2p' PROJECT_NRO_240_GOC/ProjectSettings/ProjectVersion.txt) | cut -d "(" -f2 | cut -d ")" -f1 | xargs)
          echo "UNITY_VERSION=$UNITY_VERSION" >> $CM_ENV
          echo "UNITY_VERSION_CHANGESET=$UNITY_VERSION_CHANGESET" >> $CM_ENV
          echo "UNITY_HOME=/Applications/Unity/Hub/Editor/${UNITY_VERSION}/Unity.app" >> $CM_ENV
          echo "Đang sử dụng phiên bản Unity: $UNITY_VERSION ($UNITY_VERSION_CHANGESET)"
      - name: Install Unity via Unity Hub CLI
        script: |
          echo "Bắt đầu tải và cài đặt Unity $UNITY_VERSION từ Unity Hub..."
          yes Y | /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install --version $UNITY_VERSION --changeset $UNITY_VERSION_CHANGESET -a arm64
          echo "Cài đặt iOS Build Support module cho Unity..."
          yes Y | /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install-modules --version $UNITY_VERSION -m ios -a arm64
      - name: Unity build iOS project
        script: |
          echo "Bắt đầu xuất dự án Xcode từ Unity..."
          $UNITY_HOME/Contents/MacOS/Unity \
            -batchmode \
            -quit \
            -username "$UNITY_USERNAME" \
            -password "$UNITY_PASSWORD" \
            -projectPath PROJECT_NRO_240_GOC \
            -buildTarget iOS \
            -executeMethod CodemagicBuildScript.BuildIOS \
            -logFile unity_build.log || (cat unity_build.log && exit 1)
          cat unity_build.log
      - name: Build and Package iOS App (.ipa)
        script: |
          echo "Bắt đầu biên dịch Xcode project..."
          xcodebuild \
            -workspace PROJECT_NRO_240_GOC/build/ios/Unity-iPhone.xcworkspace \
            -scheme Unity-iPhone \
            -configuration Release \
            -sdk iphoneos \
            -archivePath PROJECT_NRO_240_GOC/build/ios/Unity-iPhone.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          echo "Đóng gói file .app thành .ipa (unsigned)..."
          mkdir -p PROJECT_NRO_240_GOC/build/ios/Payload
          cp -r PROJECT_NRO_240_GOC/build/ios/Unity-iPhone.xcarchive/Products/Applications/Unity-iPhone.app PROJECT_NRO_240_GOC/build/ios/Payload/
          
          cd PROJECT_NRO_240_GOC/build/ios
          zip -r game.ipa Payload
          echo "Đã đóng gói thành công file game.ipa!"
    artifacts:
      - PROJECT_NRO_240_GOC/build/ios/*.ipa
