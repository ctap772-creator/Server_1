workflows:
  unity-ios-workflow:
    name: Unity iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - unity_credentials # Nhóm biến chứa tài khoản Unity (UNITY_USERNAME, UNITY_PASSWORD)
      xcode: latest
      cocoapods: default
    scripts:
      - name: Retrieve Used Unity Version
        script: |
          # Trích xuất phiên bản Unity và changeset từ ProjectVersion.txt
          UNITY_VERSION=$(echo $(sed -n '1p' PROJECT_NRO_240_GOC/ProjectSettings/ProjectVersion.txt) | cut -c 18-)
          UNITY_VERSION_CHANGESET=$(echo $(sed -n '2p' PROJECT_NRO_240_GOC/ProjectSettings/ProjectVersion.txt) | cut -d "(" -f2 | cut -d ")" -f1 | xargs)
          echo "UNITY_VERSION=$UNITY_VERSION" >> $CM_ENV
          echo "UNITY_VERSION_CHANGESET=$UNITY_VERSION_CHANGESET" >> $CM_ENV
          echo "UNITY_HOME=/Applications/Unity/Hub/Editor/${UNITY_VERSION}/Unity.app" >> $CM_ENV
          echo "Đang sử dụng phiên bản Unity: $UNITY_VERSION ($UNITY_VERSION_CHANGESET)"
      - name: Install Unity via Unity Hub CLI
        script: |
          echo "Bắt đầu tải và cài đặt Unity $UNITY_VERSION từ Unity Hub..."
          yes Y | /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install --version $UNITY_VERSION --changeset $UNITY_VERSION_CHANGESET -a arm64
          echo "Cài đặt iOS Build Support module cho Unity..."
          yes Y | /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install-modules --version $UNITY_VERSION -m ios -a arm64
      - name: Unity build iOS project
        script: |
          # Đường dẫn lưu file bản quyền Named User License của Unity
          LICENSE_DIR="$HOME/Library/Unity/licenses"
          LICENSE_FILE="$LICENSE_DIR/UnityEntitlementLicense.xml"

          echo "Kiểm tra file bản quyền Unity_lic.ulf trong dự án..."
          if [ -f "Unity_lic.ulf" ]; then
            echo "Tìm thấy file Unity_lic.ulf! Đang thiết lập bản quyền cho máy ảo..."
            
            mkdir -p "$LICENSE_DIR"
            cp Unity_lic.ulf "$LICENSE_FILE"
            
            # Đồng thời thiết lập đường dẫn System-wide phòng trường hợp Unity tìm kiếm .ulf
            sudo mkdir -p "/Library/Application Support/Unity"
            sudo cp Unity_lic.ulf "/Library/Application Support/Unity/Unity_lic.ulf"
            sudo chmod 644 "/Library/Application Support/Unity/Unity_lic.ulf"
            
            mkdir -p "$HOME/Library/Application Support/Unity"
            cp Unity_lic.ulf "$HOME/Library/Application Support/Unity/Unity_lic.ulf"
            
            echo "Đã cấu hình xong file bản quyền!"
          else
            echo "=========================================================="
            echo "CẢNH BÁO: Không tìm thấy file Unity_lic.ulf trong thư mục gốc của dự án!"
            echo "Chúng ta sẽ tiến hành kích hoạt trực tuyến qua VNC (chỉ cần làm 1 LẦN DUY NHẤT):"
            echo "1. Khi chạy build này, hãy chắc chắn chọn 'Enable SSH/VNC access' trong giao diện Codemagic khi nhấn Start Build."
            echo "2. Kết nối VNC vào máy ảo (sử dụng phần mềm VNC Viewer trên Windows)."
            echo "3. Trên màn hình macOS, mở ứng dụng Unity Hub."
            echo "4. Đăng nhập tài khoản Unity của bạn và kích hoạt Personal License miễn phí."
            echo "5. Tiến trình build sẽ tự động phát hiện khi bạn kích hoạt thành công!"
            echo "=========================================================="
            
            echo "Đang đợi bạn kết nối VNC và kích hoạt bản quyền từ Unity Hub trên máy ảo..."
            FOUND_LICENSE=""
            while [ -z "$FOUND_LICENSE" ]; do
              # 1. Kiểm tra file XML ở thư mục chuẩn
              if [ -f "$HOME/Library/Unity/licenses/UnityEntitlementLicense.xml" ]; then
                FOUND_LICENSE="$HOME/Library/Unity/licenses/UnityEntitlementLicense.xml"
              # 2. Kiểm tra file XML ở thư mục App Support
              elif [ -f "$HOME/Library/Application Support/Unity/licenses/UnityEntitlementLicense.xml" ]; then
                FOUND_LICENSE="$HOME/Library/Application Support/Unity/licenses/UnityEntitlementLicense.xml"
              # 3. Kiểm tra file ulf ở thư mục App Support
              elif [ -f "$HOME/Library/Application Support/Unity/Unity_lic.ulf" ]; then
                FOUND_LICENSE="$HOME/Library/Application Support/Unity/Unity_lic.ulf"
              # 4. Kiểm tra file ulf ở thư mục hệ thống
              elif [ -f "/Library/Application Support/Unity/Unity_lic.ulf" ]; then
                FOUND_LICENSE="/Library/Application Support/Unity/Unity_lic.ulf"
              else
                # 5. Tìm kiếm quét các file có tên chính xác
                ANY_FILE=$(find "$HOME/Library/Unity" "$HOME/Library/Application Support/Unity" -name "UnityEntitlementLicense.xml" -o -name "Unity_lic.ulf" 2>/dev/null | head -n 1)
                if [ -n "$ANY_FILE" ]; then
                  FOUND_LICENSE="$ANY_FILE"
                fi
              fi
              
              if [ -z "$FOUND_LICENSE" ]; then
                sleep 5
              fi
            done
            
            echo "Đã phát hiện file bản quyền được tạo thành công tại: $FOUND_LICENSE"
            
            # Copy file bản quyền ra tất cả các thư mục chuẩn để Unity Editor nhận dạng được
            mkdir -p "$LICENSE_DIR"
            cp "$FOUND_LICENSE" "$LICENSE_FILE"
            
            sudo mkdir -p "/Library/Application Support/Unity"
            sudo cp "$FOUND_LICENSE" "/Library/Application Support/Unity/Unity_lic.ulf"
            sudo chmod 644 "/Library/Application Support/Unity/Unity_lic.ulf"
            
            mkdir -p "$HOME/Library/Application Support/Unity"
            cp "$FOUND_LICENSE" "$HOME/Library/Application Support/Unity/Unity_lic.ulf"
            
            # Copy file bản quyền ra thư mục dự án để Codemagic xuất thành Artifact cho bạn tải về
            cp "$FOUND_LICENSE" ./Unity_lic.ulf
            
            echo "=========================================================="
            echo "NỘI DUNG FILE BẢN QUYỀN (Bạn có thể copy văn bản dưới đây và lưu thành file Unity_lic.ulf):"
            echo "----------------------------------------------------------"
            cat "$FOUND_LICENSE"
            echo "----------------------------------------------------------"
            echo "=========================================================="
          fi

          echo "Bắt đầu xuất dự án Xcode từ Unity ở chế độ Batchmode..."
          $UNITY_HOME/Contents/MacOS/Unity \
            -batchmode \
            -quit \
            -projectPath PROJECT_NRO_240_GOC \
            -buildTarget iOS \
            -executeMethod CodemagicBuildScript.BuildIOS \
            -logFile unity_build.log
          
          UNITY_EXIT_CODE=$?
          cat unity_build.log
          exit $UNITY_EXIT_CODE
      - name: Build and Package iOS App (.ipa)
        script: |
          echo "Bắt đầu biên dịch Xcode project..."
          if [ -d "PROJECT_NRO_240_GOC/build/ios/Unity-iPhone.xcworkspace" ]; then
            echo "Tìm thấy file .xcworkspace, tiến hành biên dịch bằng workspace..."
            xcodebuild \
              -workspace PROJECT_NRO_240_GOC/build/ios/Unity-iPhone.xcworkspace \
              -scheme Unity-iPhone \
              -configuration Release \
              -sdk iphoneos \
              -archivePath PROJECT_NRO_240_GOC/build/ios/Unity-iPhone.xcarchive \
              archive \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO
          else
            echo "Không tìm thấy .xcworkspace, tiến hành biên dịch bằng .xcodeproj..."
            xcodebuild \
              -project PROJECT_NRO_240_GOC/build/ios/Unity-iPhone.xcodeproj \
              -scheme Unity-iPhone \
              -configuration Release \
              -sdk iphoneos \
              -archivePath PROJECT_NRO_240_GOC/build/ios/Unity-iPhone.xcarchive \
              archive \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO
          fi
          
          XCODE_EXIT_CODE=$?
          if [ $XCODE_EXIT_CODE -ne 0 ]; then
            echo "Xcode build thất bại với mã lỗi $XCODE_EXIT_CODE"
            exit $XCODE_EXIT_CODE
          fi

          echo "Đóng gói file .app thành .ipa (unsigned)..."
          mkdir -p PROJECT_NRO_240_GOC/build/ios/Payload
          cp -r PROJECT_NRO_240_GOC/build/ios/Unity-iPhone.xcarchive/Products/Applications/Unity-iPhone.app PROJECT_NRO_240_GOC/build/ios/Payload/
          
          cd PROJECT_NRO_240_GOC/build/ios
          zip -r game.ipa Payload
          echo "Đã đóng gói thành công file game.ipa!"
    artifacts:
      - PROJECT_NRO_240_GOC/build/ios/*.ipa
      - Unity_lic.ulf
